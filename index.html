<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyQuest</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a12;--surface:#12121e;--surface2:#1a1a2e;
  --accent:#7c3aed;--accent2:#06b6d4;--accent3:#f59e0b;
  --text:#e2e8f0;--text2:#94a3b8;--border:rgba(124,58,237,0.25);--glow:rgba(124,58,237,0.4);
  --english:#ef4444;--japanese:#f97316;--math:#3b82f6;--science:#22c55e;--social:#a855f7;--none:#64748b;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Zen Kaku Gothic New',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background 0.6s ease}
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.85);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s}
.overlay.active{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px;max-width:500px;width:92%;max-height:85vh;overflow-y:auto;position:relative;box-shadow:0 0 60px rgba(124,58,237,0.2)}
.modal-title{font-family:'Orbitron',sans-serif;font-size:1rem;color:var(--accent2);margin-bottom:20px;letter-spacing:2px}
.close-btn{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--text2);font-size:1.4rem;cursor:pointer;transition:color 0.2s}
.close-btn:hover{color:var(--text)}
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}

/* HOME */
#home-screen{position:relative}
.home-content{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh;padding:24px 18px;gap:16px}
.home-header{display:flex;align-items:center;justify-content:space-between}
.app-title{font-family:'Orbitron',sans-serif;font-size:1.3rem;font-weight:900;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:3px}
.level-badge{display:flex;flex-direction:column;align-items:flex-end;cursor:pointer;transition:transform 0.2s;user-select:none}
.level-badge:hover{transform:scale(1.05)}
.level-label{font-family:'Orbitron',sans-serif;font-size:0.6rem;color:var(--text2);letter-spacing:2px}
.level-number{font-family:'Orbitron',sans-serif;font-size:1.6rem;font-weight:900;background:linear-gradient(90deg,var(--accent3),#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.level-title-small{font-size:0.58rem;color:var(--accent3);margin-top:2px;max-width:130px;text-align:right;line-height:1.2}
.today-stats{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 18px;display:flex;gap:16px}
.stat-item{flex:1}
.stat-label{font-size:0.6rem;color:var(--text2);letter-spacing:1px;margin-bottom:3px}
.stat-value{font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:700;color:var(--accent2)}
.xp-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 14px}
.xp-label-row{display:flex;justify-content:space-between;font-size:0.6rem;color:var(--text2);margin-bottom:6px;letter-spacing:1px}
.xp-track{height:5px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width 0.8s cubic-bezier(0.4,0,0.2,1);box-shadow:0 0 8px var(--glow)}
.mode-buttons{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mode-btn{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px 14px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:10px;transition:all 0.3s;text-decoration:none;color:inherit}
.mode-btn:hover{border-color:var(--accent);background:rgba(124,58,237,0.1);transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,58,237,0.2)}
.mode-btn .icon{font-size:1.8rem}
.mode-btn .label{font-family:'Orbitron',sans-serif;font-size:0.65rem;letter-spacing:2px;color:var(--text2)}
.mode-btn .sublabel{font-size:0.6rem;color:var(--text2);opacity:0.6}
.weekly-section{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;cursor:pointer;transition:border-color 0.2s}
.weekly-section:hover{border-color:var(--accent2)}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.section-title{font-family:'Orbitron',sans-serif;font-size:0.65rem;color:var(--text2);letter-spacing:2px}
.bar-chart{display:flex;align-items:flex-end;gap:5px;height:70px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%}
.bar-stack{flex:1;width:100%;display:flex;flex-direction:column-reverse;border-radius:3px;overflow:hidden;min-height:3px;background:rgba(255,255,255,0.04)}
.bar-segment{width:100%}
.bar-day{font-size:0.5rem;color:var(--text2)}
.subject-legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.legend-item{display:flex;align-items:center;gap:3px;font-size:0.58rem;color:var(--text2)}
.legend-dot{width:7px;height:7px;border-radius:50%}

/* STUDY SCREEN */
#study-screen{align-items:center;justify-content:center;position:relative}
.study-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;width:100%;max-width:400px;padding:40px 18px;gap:22px;min-height:100vh;justify-content:center}
.study-mode-label{font-family:'Orbitron',sans-serif;font-size:0.6rem;letter-spacing:4px;color:var(--text2)}
.timer-ring{position:relative;width:210px;height:210px;margin:0 auto}
.timer-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:rgba(255,255,255,0.05);stroke-width:6}
.ring-fill{fill:none;stroke:url(#ringGrad);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset 1s linear}
.timer-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.timer-time{font-family:'Orbitron',sans-serif;font-size:2.6rem;font-weight:900;color:var(--text);letter-spacing:2px;text-shadow:0 0 30px rgba(124,58,237,0.5)}
.timer-phase{font-size:0.6rem;color:var(--text2);letter-spacing:3px}
.subject-display{display:flex;align-items:center;gap:8px;padding:8px 18px;background:var(--surface);border:1px solid var(--border);border-radius:99px;cursor:pointer;transition:all 0.2s}
.subject-display:hover{border-color:var(--accent)}
.subject-dot{width:9px;height:9px;border-radius:50%}
.study-controls{display:flex;gap:14px;align-items:center}
.ctrl-btn{border:none;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.ctrl-main{width:70px;height:70px;background:var(--accent);color:white;font-size:1.2rem;box-shadow:0 0 28px rgba(124,58,237,0.4)}
.ctrl-main:hover{transform:scale(1.08);box-shadow:0 0 44px rgba(124,58,237,0.6)}
.ctrl-sec{width:50px;height:50px;background:var(--surface);border:1px solid var(--border);color:var(--text2);font-size:1rem}
.ctrl-sec:hover{border-color:var(--accent2);color:var(--accent2)}
.ctrl-stop{width:50px;height:50px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#ef4444;font-size:1rem}
.ctrl-stop:hover{background:rgba(239,68,68,0.2)}
.pomo-info{text-align:center;font-size:0.72rem;color:var(--text2)}
.pomo-cycle{font-family:'Orbitron',sans-serif;font-size:0.58rem;color:var(--accent3);letter-spacing:2px;margin-bottom:4px}
.back-btn{position:absolute;top:18px;left:18px;background:none;border:none;color:var(--text2);font-size:1.1rem;cursor:pointer;transition:color 0.2s;z-index:10}
.back-btn:hover{color:var(--text)}
.ctrl-extend{width:50px;height:50px;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);color:var(--accent3);font-size:0.65rem;font-family:'Orbitron',sans-serif;letter-spacing:0;display:none}
.ctrl-extend:hover{background:rgba(245,158,11,0.25)}

/* SUBJECT MODAL */
.subject-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.subject-choice{display:flex;align-items:center;gap:8px;padding:12px 14px;background:var(--surface2);border:1px solid rgba(255,255,255,0.06);border-radius:10px;cursor:pointer;transition:all 0.2s}
.subject-choice:hover{transform:scale(1.03);background:rgba(255,255,255,0.04)}
.subject-choice.selected{border-color:currentColor;background:rgba(255,255,255,0.05)}
.subject-choice-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* STATS */
#stats-screen{padding:0}
.stats-content{padding:22px 18px;display:flex;flex-direction:column;gap:18px}
.stats-header{display:flex;align-items:center;gap:12px}
.stats-title{font-family:'Orbitron',sans-serif;font-size:0.95rem;letter-spacing:3px;color:var(--accent2)}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.summary-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px}
.summary-card-label{font-size:0.58rem;color:var(--text2);letter-spacing:1px;margin-bottom:4px}
.summary-card-value{font-family:'Orbitron',sans-serif;font-size:0.95rem;font-weight:700;color:var(--accent2)}
.calendar-section{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px}
.calendar-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-month{font-family:'Orbitron',sans-serif;font-size:0.75rem;letter-spacing:2px}
.cal-nav-btn{background:none;border:none;color:var(--text2);cursor:pointer;font-size:1rem;transition:color 0.2s}
.cal-nav-btn:hover{color:var(--text)}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day-label{font-size:0.52rem;color:var(--text2);text-align:center;padding:3px 0}
.cal-day{aspect-ratio:1;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:0.6rem;cursor:default;transition:all 0.2s}
.cal-day.has-data{cursor:pointer}
.cal-day.has-data:hover{transform:scale(1.12)}
.cal-day.today{box-shadow:0 0 0 1px var(--accent2)}
.cal-day.empty{color:var(--text2);opacity:0.2}

/* LEVEL SCREEN */
#level-screen{padding:0}
.level-content{padding:22px 18px;display:flex;flex-direction:column;gap:18px}
.level-hero{text-align:center;padding:18px;background:var(--surface);border:1px solid var(--border);border-radius:14px}
.level-hero-number{font-family:'Orbitron',sans-serif;font-size:3.5rem;font-weight:900;background:linear-gradient(135deg,var(--accent3),#f97316,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.level-hero-sub{font-size:0.75rem;color:var(--text2);margin-top:6px}
.chosen-title-row{display:flex;align-items:center;gap:8px;justify-content:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.level-tabs{display:flex;gap:8px}
.level-tab{flex:1;padding:9px;border-radius:9px;background:var(--surface);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:0.72rem;font-family:'Zen Kaku Gothic New',sans-serif;transition:all 0.2s;text-align:center}
.level-tab.active{background:rgba(124,58,237,0.2);border-color:var(--accent);color:var(--text)}
.bg-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.bg-card{border-radius:10px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:all 0.2s;position:relative;aspect-ratio:16/9}
.bg-card.locked{opacity:0.28;cursor:not-allowed}
.bg-card.selected{border-color:var(--accent2);box-shadow:0 0 16px rgba(6,182,212,0.3)}
.bg-card:not(.locked):hover{transform:scale(1.04)}
.bg-preview{width:100%;height:100%;display:flex;align-items:flex-end;justify-content:flex-start;padding:4px 6px}
.bg-name{font-size:0.52rem;color:rgba(255,255,255,0.8);background:rgba(0,0,0,0.5);padding:1px 4px;border-radius:3px;backdrop-filter:blur(4px)}
.bg-lock{position:absolute;top:4px;right:4px;font-size:0.65rem}
.bg-lv{position:absolute;top:4px;left:4px;font-size:0.48rem;color:rgba(255,255,255,0.5);font-family:'Orbitron',sans-serif}
.bg-sel-mark{position:absolute;bottom:4px;right:4px;font-size:0.7rem}
.title-list{display:flex;flex-direction:column;gap:6px}
.title-card{display:flex;align-items:center;gap:10px;padding:11px 12px;background:var(--surface);border:1px solid var(--border);border-radius:9px;cursor:pointer;transition:all 0.2s}
.title-card.locked{opacity:0.28;cursor:not-allowed}
.title-card.selected{border-color:var(--accent3);background:rgba(245,158,11,0.05)}
.title-card:not(.locked):hover{border-color:var(--accent)}
.title-icon{font-size:1.1rem}
.title-name{font-size:0.82rem;flex:1}
.title-lv{font-size:0.56rem;color:var(--text2);font-family:'Orbitron',sans-serif}

/* NOTIFICATION */
.notif{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--accent);border-radius:10px;padding:10px 18px;z-index:300;min-width:240px;text-align:center;box-shadow:0 0 28px rgba(124,58,237,0.3);animation:nIn 0.35s ease,nOut 0.35s ease 2.65s forwards}
@keyframes nIn{from{opacity:0;transform:translateX(-50%) translateY(18px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes nOut{from{opacity:1}to{opacity:0;transform:translateX(-50%) translateY(-8px)}}
.notif-t{font-family:'Orbitron',sans-serif;font-size:0.65rem;color:var(--accent3);letter-spacing:2px}
.notif-b{font-size:0.82rem;margin-top:3px}
.lv-flash{position:fixed;inset:0;z-index:500;background:radial-gradient(circle,rgba(245,158,11,0.3) 0%,transparent 70%);pointer-events:none;animation:flash 1s ease forwards}
@keyframes flash{0%{opacity:0}30%{opacity:1}100%{opacity:0}}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(124,58,237,0.3);border-radius:99px}
</style>
</head>
<body>

<!-- HOME -->
<div id="home-screen" class="screen active">
  <div class="home-content">
    <div class="home-header">
      <div class="app-title">STUDY<br>QUEST</div>
      <div class="level-badge" onclick="showLevelScreen()">
        <div class="level-label">LEVEL</div>
        <div class="level-number" id="home-level">1</div>
        <div class="level-title-small" id="home-title-small">—</div>
      </div>
    </div>
    <div class="today-stats">
      <div class="stat-item"><div class="stat-label">TODAY</div><div class="stat-value" id="today-val">0分</div></div>
      <div class="stat-item"><div class="stat-label">STREAK</div><div class="stat-value" id="streak-val">0日</div></div>
      <div class="stat-item"><div class="stat-label">TOTAL</div><div class="stat-value" id="total-val">0分</div></div>
    </div>
    <div class="xp-wrap">
      <div class="xp-label-row"><span>NEXT LEVEL</span><span id="xp-label">0秒 / 1分</span></div>
      <div class="xp-track"><div class="xp-fill" id="xp-bar" style="width:0%"></div></div>
    </div>
    <div class="mode-buttons">
      <div class="mode-btn" onclick="startMode('stopwatch')">
        <div class="icon">⏱</div>
        <div class="label">STOPWATCH</div>
        <div class="sublabel">経過時間を記録</div>
      </div>
      <div class="mode-btn" onclick="startMode('pomodoro')">
        <div class="icon">🍅</div>
        <div class="label">POMODORO</div>
        <div class="sublabel">25分集中 / 5分休憩</div>
      </div>
    </div>
    <div class="weekly-section" onclick="showStats()">
      <div class="section-header">
        <div class="section-title">WEEKLY STUDY</div>
        <div style="color:var(--text2);font-size:0.8rem">→</div>
      </div>
      <div class="bar-chart" id="weekly-chart"></div>
      <div class="subject-legend" id="subj-legend"></div>
    </div>
  </div>
</div>

<!-- STUDY -->
<div id="study-screen" class="screen">
  <button class="back-btn" onclick="backFromStudy()">←</button>
  <div class="study-content">
    <div class="study-mode-label" id="s-mode-label">STOPWATCH</div>
    <div class="timer-ring">
      <svg viewBox="0 0 210 210">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#7c3aed"/>
            <stop offset="100%" style="stop-color:#06b6d4"/>
          </linearGradient>
        </defs>
        <circle class="ring-bg" cx="105" cy="105" r="96"/>
        <circle class="ring-fill" id="ring-fill" cx="105" cy="105" r="96"
          stroke-dasharray="603" stroke-dashoffset="603"/>
      </svg>
      <div class="timer-center">
        <div class="timer-time" id="timer-disp">00:00</div>
        <div class="timer-phase" id="timer-phase">準備OK</div>
      </div>
    </div>
    <div class="subject-display" onclick="openSubjectModal()">
      <div class="subject-dot" id="s-dot" style="background:var(--none)"></div>
      <div id="s-name" style="font-size:0.85rem">指定なし</div>
      <div style="font-size:0.65rem;color:var(--text2)">▼ 変更</div>
    </div>
    <div class="pomo-info" id="pomo-info" style="display:none">
      <div class="pomo-cycle" id="pomo-cycle">SET 1 — 集中</div>
    </div>
    <div class="study-controls">
      <button class="ctrl-btn ctrl-stop" id="stop-btn" onclick="stopSession()">⏹</button>
      <button class="ctrl-btn ctrl-main" id="pp-btn" onclick="togglePP()">▶</button>
      <button class="ctrl-btn ctrl-extend" id="extend-btn" onclick="extendRest()">+5分</button>
    </div>
  </div>
</div>

<!-- STATS -->
<div id="stats-screen" class="screen">
  <div class="stats-content">
    <div class="stats-header">
      <button class="back-btn" style="position:relative;top:0;left:0" onclick="showHome()">←</button>
      <div class="stats-title">STATISTICS</div>
    </div>
    <div class="summary-grid">
      <div class="summary-card"><div class="summary-card-label">累計勉強時間</div><div class="summary-card-value" id="st-total"></div></div>
      <div class="summary-card"><div class="summary-card-label">今日の勉強時間</div><div class="summary-card-value" id="st-today"></div></div>
      <div class="summary-card"><div class="summary-card-label">最大連続勉強時間</div><div class="summary-card-value" id="st-maxcon"></div></div>
      <div class="summary-card"><div class="summary-card-label">1日最大勉強時間</div><div class="summary-card-value" id="st-maxday"></div></div>
      <div class="summary-card"><div class="summary-card-label">累計勉強日数</div><div class="summary-card-value" id="st-totaldays"></div></div>
      <div class="summary-card"><div class="summary-card-label">連続勉強日数</div><div class="summary-card-value" id="st-streak"></div></div>
    </div>
    <div class="calendar-section">
      <div class="calendar-nav">
        <button class="cal-nav-btn" onclick="calMove(-1)">‹</button>
        <div class="cal-month" id="cal-label"></div>
        <button class="cal-nav-btn" onclick="calMove(1)">›</button>
      </div>
      <div class="calendar-grid" id="cal-grid"></div>
    </div>
  </div>
</div>

<!-- LEVEL -->
<div id="level-screen" class="screen">
  <div class="level-content">
    <div class="stats-header">
      <button class="back-btn" style="position:relative;top:0;left:0" onclick="showHome()">←</button>
      <div class="stats-title">MY PROFILE</div>
    </div>
    <div class="level-hero">
      <div class="level-hero-number" id="prof-lv">1</div>
      <div class="level-hero-sub">STUDYQUEST LEVEL</div>
      <div class="xp-track" style="height:7px;margin-top:10px"><div class="xp-fill" id="prof-xp-bar" style="width:0%"></div></div>
      <div style="font-size:0.6rem;color:var(--text2);margin-top:4px" id="prof-xp-text"></div>
      <div class="chosen-title-row" id="chosen-title-row"><span style="font-size:0.7rem;color:var(--text2)">称号なし</span></div>
    </div>
    <div class="level-tabs">
      <button class="level-tab active" id="tab-bg-btn" onclick="switchTab('bg')">🎨 背景</button>
      <button class="level-tab" id="tab-title-btn" onclick="switchTab('title')">🏆 称号</button>
    </div>
    <div id="tab-bg"><div class="bg-grid" id="bg-grid"></div></div>
    <div id="tab-title" style="display:none"><div class="title-list" id="title-list"></div></div>
  </div>
</div>

<!-- MODALS -->
<div class="overlay" id="subj-modal">
  <div class="modal">
    <button class="close-btn" onclick="closeSubjModal()">×</button>
    <div class="modal-title">科目を選択</div>
    <div class="subject-grid" id="subj-grid"></div>
  </div>
</div>

<div class="overlay" id="day-modal">
  <div class="modal">
    <button class="close-btn" onclick="document.getElementById('day-modal').classList.remove('active')">×</button>
    <div class="modal-title" id="day-modal-title"></div>

function todayStr(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function fmtTime(s){
  s=Math.max(0,Math.floor(s));
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  if(h>0)return`${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return`${m}:${String(sec).padStart(2,'0')}`;
}
function fmtH(s){
  s=Math.floor(s);const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);
  if(h>0)return`${h}時間${m}分`;return`${m}分`;
}
function subj(id){return SUBJECTS.find(x=>x.id===id)||SUBJECTS[5];}

// ============================================================
// STUDY TIME ADDITION
// ============================================================
function addTime(sec,subject){
  if(sec<=0)return;
  const today=todayStr();
  const isNew=!S.daily[today];
  if(isNew){S.daily[today]={total:0,subjects:{}};}
  S.daily[today].total+=sec;
  S.daily[today].subjects[subject]=(S.daily[today].subjects[subject]||0)+sec;
  S.totalSec+=sec;
  if(S.daily[today].total>S.maxDaySec)S.maxDaySec=S.daily[today].total;
  if(isNew)updateStreak(today);
  // XP
  S.xp+=sec;
  let leveled=false;
  while(S.level<MAX_LEVEL){
    const need=xpForLevel(S.level);
    if(S.xp>=need){S.xp-=need;S.level++;leveled=true;onLevelUp(S.level);}
    else break;
  }
  if(leveled)showLvUpEffect();
  save();
  updateHomeUI();
}

function updateStreak(today){
  const yest=new Date(today);yest.setDate(yest.getDate()-1);
  const ys=yest.getFullYear()+'-'+String(yest.getMonth()+1).padStart(2,'0')+'-'+String(yest.getDate()).padStart(2,'0');
  if(S.lastDate===ys)S.streakDays++;
  else if(S.lastDate!==today)S.streakDays=1;
  if(S.lastDate!==today){S.totalDays++;S.lastDate=today;}
}

function onLevelUp(lv){
  BACKGROUNDS.forEach(bg=>{if(bg.level===lv&&!S.unlockedBgs.includes(bg.id)){S.unlockedBgs.push(bg.id);setTimeout(()=>notif('🎨 背景解放！',`Lv.${lv} 「${bg.name}」`),1500);}});
  TITLES.forEach(t=>{if(t.level===lv&&!S.unlockedTitles.includes(t.id)){S.unlockedTitles.push(t.id);setTimeout(()=>notif('🏆 称号獲得！',`「${t.icon}${t.name}」`),2200);}});
}

// ============================================================
// TIMER ENGINE
// ============================================================
let timerIv=null;

function startIv(){
  if(timerIv)clearInterval(timerIv);
  timerIv=setInterval(tick,1000);
}

function tick(){
  if(S.paused||!S.active||!S.wallStart)return;
  const elapsed=Math.floor((Date.now()-S.wallStart)/1000);
  const total=S.accumSec+elapsed;
  if(S.mode==='stopwatch'){
    updateTimerDisp(total);
    setRing(-1,-1);
    document.getElementById('timer-phase').textContent='計測中';
  }else{
    pomoTick(total);
  }
}

function pomoTick(total){
  const phaseElapsed=total-S.pomoPhaseStart;
  if(S.pomoPhase==='work'){
    const remain=S.pomoWorkSec-phaseElapsed;
    if(remain<=0){
      // work done
      const elapsed2=Math.floor((Date.now()-S.wallStart)/1000);
      addTime(S.pomoWorkSec,S.subject);
      S.accumSec+=S.pomoWorkSec;
      S.wallStart=Date.now();
      S.pomoPhase='rest';S.pomoRestSec=5*60;
      S.pomoPhaseStart=S.accumSec;
      playBeep();
      notif('⏸️ 休憩タイム！','5分間休憩しましょう');
      document.getElementById('extend-btn').style.display='flex';
      updatePomoLabel();
      setRing(5*60,5*60);
    }else{
      updateTimerDisp(remain);setRing(remain,S.pomoWorkSec);
      document.getElementById('timer-phase').textContent='集中中';
    }
  }else{
    const remain=S.pomoRestSec-phaseElapsed;
    if(remain<=0){
      // rest done
      S.accumSec+=S.pomoRestSec;
      S.wallStart=Date.now();
      S.pomoPhase='work';S.pomoSet++;
      S.pomoWorkSec=25*60;S.pomoRestSec=5*60;
      S.pomoPhaseStart=S.accumSec;
      playBeep();
      notif('✅ 集中タイム！',`Set ${S.pomoSet} 開始`);
      document.getElementById('extend-btn').style.display='none';
      updatePomoLabel();
      setRing(25*60,25*60);
    }else{
      updateTimerDisp(remain);setRing(remain,S.pomoRestSec);
      document.getElementById('timer-phase').textContent='休憩中';
      document.getElementById('ring-fill').style.stroke='var(--accent2)';
    }
  }
}

function updateTimerDisp(sec){
  document.getElementById('timer-disp').textContent=fmtTime(sec);
}

function setRing(cur,total){
  const rf=document.getElementById('ring-fill');
  const C=603;
  if(total<=0||cur<0){rf.style.strokeDashoffset='0';rf.style.stroke='url(#ringGrad)';return;}
  rf.style.strokeDashoffset=C*(1-Math.max(0,cur)/total);
  if(S.pomoPhase==='rest')rf.style.stroke='var(--accent2)';
  else rf.style.stroke='url(#ringGrad)';
}

function updatePomoLabel(){
  const el=document.getElementById('pomo-cycle');
  el.textContent=`SET ${S.pomoSet} — ${S.pomoPhase==='work'?'集中':'休憩'}`;
  el.style.color=S.pomoPhase==='work'?'var(--accent3)':'var(--accent2)';
}

// SESSION CONTROL
// ============================================================
function startMode(mode){
  S.mode=mode;S.active=true;S.paused=true;S.accumSec=0;S.wallStart=null;
  if(mode==='pomodoro'){
    S.pomoPhase='work';S.pomoSet=1;S.pomoWorkSec=25*60;S.pomoRestSec=5*60;S.pomoPhaseStart=0;
    document.getElementById('pomo-info').style.display='block';
    document.getElementById('extend-btn').style.display='none';
    document.getElementById('s-mode-label').textContent='POMODORO';
    updateTimerDisp(25*60);setRing(25*60,25*60);updatePomoLabel();
  }else{
    document.getElementById('pomo-info').style.display='none';
    document.getElementById('extend-btn').style.display='none';
    document.getElementById('s-mode-label').textContent='STOPWATCH';
    updateTimerDisp(0);setRing(-1,-1);
    document.getElementById('timer-phase').textContent='準備OK';
  }
  updateSubjDisp();applyBg();
  showScreen('study-screen');
  openSubjectModal();
  startIv();save();
}

function togglePP(){
  if(!S.active)return;
  if(S.paused){
    S.wallStart=Date.now();S.paused=false;
    document.getElementById('pp-btn').textContent='⏸';
  }else{
    commitSeg();S.paused=true;
    document.getElementById('pp-btn').textContent='▶';
  }
  save();
}

function commitSeg(){
  if(!S.wallStart)return;
  const elapsed=Math.floor((Date.now()-S.wallStart)/1000);
  if(S.mode==='stopwatch'){addTime(elapsed,S.subject);}
  S.accumSec+=elapsed;S.wallStart=null;
}

function stopSession(){
  if(!S.active)return;
  if(!S.paused&&S.wallStart)commitSeg();
  S.active=false;S.paused=true;
  if(timerIv)clearInterval(timerIv);timerIv=null;
  showHome();save();
}

function extendRest(){
  S.pomoRestSec+=5*60;
  notif('⏱ 5分延長','休憩をもう少し続けましょう');
}

function backFromStudy(){
  if(S.active){if(confirm('セッションを終了しますか？'))stopSession();}
  else showHome();
}

// SOUND
// ============================================================
function playBeep(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [[880,0],[660,0.15],[880,0.3]].forEach(([f,t])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=f;g.gain.setValueAtTime(0.3,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.12);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+0.12);
    });
  }catch(e){}
}

  document.getElementById('xp-label').textContent=`${Math.floor(S.xp)}秒 / ${fmtH(need)}`;
  const t=S.selTitle?TITLES.find(x=>x.id===S.selTitle):null;

function renderWeekly(){
  const chart=document.getElementById('weekly-chart');chart.innerHTML='';
  const days=[];
  for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);
    days.push({str:d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'),
    label:['日','月','火','水','木','金','土'][d.getDay()]});}
  const maxSec=Math.max(1,...days.map(d=>S.daily[d.str]?.total||0));
  days.forEach(day=>{
    const data=S.daily[day.str]||{total:0,subjects:{}};
    const col=document.createElement('div');col.className='bar-col';
    const stack=document.createElement('div');stack.className='bar-stack';
    const hPct=(data.total/maxSec)*100;
    if(data.total>0){
      ['english','japanese','math','science','social','none'].forEach(sid=>{
        const sec=data.subjects[sid]||0;if(!sec)return;
        const seg=document.createElement('div');seg.className='bar-segment';
        seg.style.background=subj(sid).color;
        seg.style.height=((sec/data.total)*hPct)+'%';
        stack.appendChild(seg);
      });
    }
    const lbl=document.createElement('div');lbl.className='bar-day';lbl.textContent=day.label;
    col.appendChild(stack);col.appendChild(lbl);chart.appendChild(col);
  });
  const legend=document.getElementById('subj-legend');legend.innerHTML='';
  SUBJECTS.forEach(s=>{
    const li=document.createElement('div');li.className='legend-item';
    li.innerHTML=`<div class="legend-dot" style="background:${s.color}"></div>${s.name}`;
    legend.appendChild(li);
  });
}

  const list=document.getElementById('title-list');list.innerHTML='';
  TITLES.forEach(t=>{
    const unlocked=S.unlockedTitles.includes(t.id)||S.level>=t.level;
    const selected=S.selTitle===t.id;
    const card=document.createElement('div');
    card.className='title-card'+(unlocked?'':' locked')+(selected?' selected':'');
    card.innerHTML=`<div class="title-icon">${t.icon}</div><div class="title-name">${t.name}</div><div class="title-lv">Lv.${t.level}</div>${!unlocked?'<span>🔒</span>':''}`;
    if(unlocked)card.onclick=()=>{S.selTitle=S.selTitle===t.id?null:t.id;save();updateLevelUI();updateHomeUI();};
    list.appendChild(card);
  });
}

// ============================================================
// BACKGROUND
// ============================================================
function applyBg(){
  const bg=S.selBg?BACKGROUNDS.find(b=>b.id===S.selBg):null;
  if(bg)document.body.style.background=bg.css;
  else document.body.style.background='var(--bg)';
}

// ============================================================
// PAGE VISIBILITY & PERSISTENCE
// ============================================================
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden&&!S.paused&&S.active){tick();}
});

window.addEventListener('beforeunload',()=>{
  if(!S.paused&&S.active&&S.wallStart){
    const elapsed=Math.floor((Date.now()-S.wallStart)/1000);
    if(S.mode==='stopwatch')addTime(elapsed,S.subject);
    S.accumSec+=elapsed;S.wallStart=Date.now();
  }
  save();
});

// ============================================================
// INIT
// ============================================================
window.addEventListener('load',()=>{
  load();
  applyBg();
  if(S.active){
    S.paused=true;
    document.getElementById('pp-btn').textContent='▶';
    updateSubjDisp();
    if(S.mode==='pomodoro'){
      document.getElementById('pomo-info').style.display='block';
      updatePomoLabel();
    }
    startIv();
    showScreen('study-screen');
  }else{
    showHome();
  }
});
</script>
</body>
</html>
